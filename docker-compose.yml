version: '3.5'

services:
  db:
    image: postgres:16
    restart: always
    env_file:
      - .env
    networks:
      - mainnet
    container_name: kubbetition-postgres
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    ports:
      - '127.0.0.1:5432:5432'
    healthcheck:
      # pg_isready alone can pass while Postgres still rejects connections (57P03)
      test:
        [
          'CMD-SHELL',
          'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB" && psql -U "$$POSTGRES_USER" -d "$$POSTGRES_DB" -c "SELECT 1" >/dev/null',
        ]
      interval: 2s
      timeout: 5s
      retries: 15
      start_period: 30s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kubbetition
    env_file:
      - .env
    ports:
      - '3000:3000'
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - mainnet
    volumes:
      - ./src:/app/src
      # - ./src:/app/node_modules

  pgadmin:
    image: dpage/pgadmin4
    restart: always
    container_name: kubbetition-pgadmin
    networks:
      - mainnet
    env_file:
      - .env
    ports:
      - '127.0.0.1:5050:80'
    volumes:
      # Persist saved servers, credentials, and pgAdmin settings across container recreate
      - ./pgadmin/data:/var/lib/pgadmin
    depends_on:
      - db

  redis:
    image: redis
    command: /bin/sh -c "redis-server --requirepass $$REDIS_PASS"
    networks:
      - mainnet
    env_file:
      - .env
    ports:
      - '127.0.0.1:6379:6379'
    volumes:
      - ./redis/data:/data

  rabbitmq:
    image: rabbitmq:3-management
    container_name: kubbetition-rabbitmq
    hostname: rabbitmq
    networks:
      - mainnet
    env_file:
      - .env
    volumes:
      - /var/lib/rabbitmq
    ports:
      - '127.0.0.1:5672:5672'
      - '127.0.0.1:15672:15672'

networks:
  mainnet: